<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brauhof Wien | Digital Reborn 2026</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --gold: #f4be1d;
            --dark: #050505;
            --white: #ffffff;
            --red: #ff4d4d;
            --pappe: url('https://www.transparenttextures.com/patterns/paper.png');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- HEADER --- */
        header { position: fixed; top: 0; width: 100%; z-index: 100; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(5,5,5,0.95), transparent); }
        .logo { background: var(--white); color: var(--dark); padding: 8px 12px; font-weight: 900; font-size: 1.1rem; text-decoration: none; border-radius: 4px; }
        .live-badge { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 50px; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(15px); }
        .pulse { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); animation: pulse 2s infinite; }

        /* --- SECTIONS --- */
        section { min-height: 100vh; padding: 120px 20px 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        h2 { font-size: 3.2rem; text-transform: uppercase; font-weight: 900; line-height: 0.85; margin-bottom: 25px; italic: true; text-align: center; }
        .gold-text { color: var(--gold); }
        p.lead { max-width: 500px; text-align: center; opacity: 0.7; font-size: 0.9rem; line-height: 1.6; margin-bottom: 40px; }

        /* --- SWIPE GALLERY --- */
        .gallery-container { width: 100%; max-width: 550px; position: relative; border-radius: 30px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
        .slider { display: flex; overflow-x: auto; snap-type: x mandatory; scrollbar-width: none; }
        .slider::-webkit-scrollbar { display: none; }
        .slide { min-width: 100%; aspect-ratio: 4/5; snap-align: center; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* --- AGGRESSIVE CTA ELEMENTS --- */
        .scarcity-bar { width: 100%; max-width: 320px; height: 4px; background: #222; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .scarcity-fill { width: 85%; height: 100%; background: var(--red); animation: slideIn 2s ease; }
        
        .btn-action { background: var(--gold); color: #000; padding: 20px 40px; border-radius: 18px; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; width: 100%; max-width: 320px; font-size: 0.9rem; letter-spacing: -0.5px; }
        .btn-action:hover { transform: scale(1.03); background: var(--white); }
        .btn-sub { font-size: 10px; opacity: 0.6; display: block; margin-top: 5px; font-weight: 400; }

        /* --- ZAPFHAHN --- */
        .tap-area { background: #111; padding: 40px; border-radius: 40px; border: 1px solid #222; text-align: center; width: 100%; max-width: 320px; }
        .tap-handle { width: 70px; height: 140px; background: #222; margin: 20px auto; border-radius: 0 0 25px 25px; position: relative; overflow: hidden; cursor: pointer; border: 4px solid #333; }
        .beer-fill { position: absolute; bottom: 0; width: 100%; background: var(--gold); transition: height 0.4s ease; }

        /* --- MODAL --- */
        #bookingModal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: flex-end; justify-content: center; background: rgba(0,0,0,0.92); opacity: 0; pointer-events: none; transition: 0.4s; }
        #bookingModal.active { opacity: 1; pointer-events: auto; }
        .modal-sheet { width: 100%; max-width: 500px; background: #fff; color: #000; padding: 40px 30px; border-radius: 40px 40px 0 0; background-image: var(--pappe); transform: translateY(100%); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        #bookingModal.active .modal-sheet { transform: translateY(0); }

        /* --- FEEDBACK --- */
        .feedback-bar { position: fixed; bottom: 0; width: 100%; background: var(--dark); border-top: 1px solid rgba(255,255,255,0.1); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 90; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes slideIn { from { width: 0%; } to { width: 85%; } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">BH26</a>
        <div class="live-badge">
            <div class="pulse"></div>
            <div style="font-size: 0.55rem; font-weight: 900;">
                <span style="color:var(--gold)">STATUS</span><br>85% AUSGEBUCHT
            </div>
        </div>
    </header>

    <section>
        <h1 style="font-size: 4rem; font-weight: 900; line-height: 0.8; text-align: center;">BRAUHOF<br><span class="gold-text">WIEN</span></h1>
        <p style="margin-top: 20px; letter-spacing: 4px; font-weight: 900; font-size: 0.6rem; opacity: 0.4;">KEIN BLA-BLA. NUR BIER.</p>
    </section>

    <section id="essen">
        <h2>WIENER<br><span class="gold-text">KÜCHE</span></h2>
        <div class="gallery-container">
            <div class="slider">
                <div class="slide"><img src="https://brauhof-wien.at/wp-content/uploads/2021/05/Brauhof-Wien-Speisen-1.jpg"></div>
                <div class="slide"><img src="https://brauhof-wien.at/wp-content/uploads/2021/05/Brauhof-Wien-Speisen-2.jpg"></div>
            </div>
        </div>
        <div style="margin-top: 30px; width: 100%; max-width: 320px;">
            <button onclick="openBooking('Tisch')" class="btn-action">LETZTEN TISCH SICHERN<span class="btn-sub">AKTUELL NUR NOCH 3 VERFÜGBAR</span></button>
            <div class="scarcity-bar"><div class="scarcity-fill"></div></div>
        </div>
    </section>

    <section id="seminare" style="background: #080808;">
        <h2>TAGEN OHNE<br><span class="gold-text">BLA-BLA</span></h2>
        <div class="gallery-container">
            <div class="slider">
                <div class="slide"><img src="https://brauhof-wien.at/wp-content/uploads/2021/05/Brauhof-Wien-Seminar-1.jpg"></div>
                <div class="slide"><img src="https://brauhof-wien.at/wp-content/uploads/2021/05/Brauhof-Wien-Seminar-2.jpg"></div>
            </div>
        </div>
        <button onclick="openBooking('Seminar')" class="btn-action" style="margin-top: 30px; background: var(--white);">
            🚀 SCHLACHTPLAN ERSTELLEN
            <span class="btn-sub">IN 30 SEK. ZUM ANGEBOT</span>
        </button>
    </section>

    <section id="booking">
        <h2>ZIMMER<br><span class="gold-text">ZAPFEN</span></h2>
        <div class="tap-area">
            <div class="tap-handle" onclick="fillBeer()">
                <div id="beerFill" class="beer-fill" style="height: 0%;"></div>
            </div>
            <p id="tapText" style="font-size: 0.6rem; font-weight: 900; opacity: 0.4;">TAPPEN ZUM RESERVIEREN</p>
        </div>
    </section>

    <div id="bookingModal">
        <div class="modal-sheet">
            <h3 style="font-weight: 900; font-size: 2rem; line-height: 0.9; margin-bottom: 30px;">JETZT <span class="gold-text">FIXIEREN</span>.</h3>
            <input type="text" placeholder="DEIN NAME" style="width: 100%; padding: 18px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; font-weight: 900; outline: none;">
            <input type="email" placeholder="EMAIL" style="width: 100%; padding: 18px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 25px; font-weight: 900; outline: none;">
            <button onclick="location.reload()" class="btn-action" style="background: #000; color: #fff; width: 100%;">ANFRAGE ABSCHICKEN</button>
            <button onclick="closeModal()" style="width: 100%; background: none; border: none; font-weight: 900; font-size: 0.6rem; margin-top: 20px; cursor: pointer; opacity: 0.3;">ABBRECHEN</button>
        </div>
    </div>

    <div class="feedback-bar">
        <div style="font-size: 0.6rem; font-weight: 900;">
            <span style="color:var(--gold)">🎁 AKTION</span><br>ANSTOẞEN & 1. BIER GRATIS
        </div>
        <button class="btn-action" style="padding: 10px 20px; width: auto; font-size: 0.6rem;" onclick="cheers()">🍻 DIGITAL ANSTOẞEN</button>
    </div>

    <script>
        let tapLevel = 0;

        function fillBeer() {
            if (tapLevel < 100) {
                tapLevel += 20;
                document.getElementById('beerFill').style.height = tapLevel + '%';
                if(navigator.vibrate) navigator.vibrate(40);
                if (tapLevel >= 100) {
                    setTimeout(() => openBooking('Zimmer'), 500);
                }
            }
        }

        function openBooking(type) {
            document.getElementById('bookingModal').classList.add('active');
            if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
        }

        function closeModal() {
            document.getElementById('bookingModal').classList.remove('active');
        }

        function cheers() {
            alert("CODE: BRAUHOF2026 - Zeig das an der Bar für dein Gratis-Bier!");
            if(navigator.vibrate) navigator.vibrate([50, 100, 50]);
        }
    </script>
</body>
</html>
